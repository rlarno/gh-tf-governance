name: "Enterprise: Terraform Apply"

on:
  push:
    branches: [main]
    paths:
      - 'enterprise/**'
      - '.github/workflows/enterprise-apply.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  terraform-apply:
    name: Enterprise Apply
    runs-on: ubuntu-latest
    environment: enterprise

    defaults:
      run:
        working-directory: enterprise

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        env:
          TF_VAR_github_app_pem_file: ${{ secrets.ENT_APP_PRIVATE_KEY }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false tfplan
        env:
          TF_VAR_github_app_pem_file: ${{ secrets.ENT_APP_PRIVATE_KEY }}

      # ── Auto-install the enterprise app on every organization ──
      # Uses the enterprise installation token to call
      # POST /enterprises/{enterprise}/apps/organizations/{org}/installations
      # This is idempotent — already-installed orgs return 409 and are skipped.
      - name: Install enterprise app on organizations
        if: success()
        env:
          APP_PEM: ${{ secrets.ENT_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # Read values from Terraform outputs
          APP_ID=$(terraform output -raw github_app_id)
          CLIENT_ID=$(terraform output -raw github_app_client_id)
          ENT_INSTALL_ID=$(terraform output -raw github_app_installation_id)
          ENTERPRISE=$(terraform output -raw enterprise_slug)
          ORG_NAMES=$(terraform output -json organization_names)

          echo "::group::Generate JWT"
          # Build a JWT signed with the app's private key
          NOW=$(date +%s)
          IAT=$((NOW - 60))
          EXP=$((NOW + 600))

          HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          PAYLOAD=$(printf '{"iss":"%s","iat":%d,"exp":%d}' "$APP_ID" "$IAT" "$EXP" \
            | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          SIGNATURE=$(printf '%s.%s' "$HEADER" "$PAYLOAD" \
            | openssl dgst -sha256 -sign <(echo "$APP_PEM") \
            | openssl base64 -A | tr '+/' '-_' | tr -d '=')

          JWT="${HEADER}.${PAYLOAD}.${SIGNATURE}"
          echo "JWT generated ✔"
          echo "::endgroup::"

          echo "::group::Obtain enterprise installation access token"
          TOKEN=$(curl -sf -X POST \
            "https://api.github.com/app/installations/${ENT_INSTALL_ID}/access_tokens" \
            -H "Authorization: Bearer ${JWT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            | jq -r '.token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to obtain enterprise installation token"
            exit 1
          fi
          echo "Enterprise token obtained ✔"
          echo "::endgroup::"

          echo "::group::Install app on organizations"
          echo "$ORG_NAMES" | jq -r '.[]' | while read -r ORG; do
            echo "► Installing app on org: ${ORG}"
            HTTP_CODE=$(curl -s -o /tmp/install_response.json -w '%{http_code}' \
              -X POST \
              "https://api.github.com/enterprises/${ENTERPRISE}/apps/organizations/${ORG}/installations" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "{\"client_id\":\"${CLIENT_ID}\",\"repository_selection\":\"all\"}")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              INSTALL_ID=$(jq -r '.id' /tmp/install_response.json)
              echo "  ✅ Installed — org installation ID: ${INSTALL_ID}"
              echo "     Use this installation ID in orgs/${ORG}/${ORG}.auto.tfvars"
            elif [ "$HTTP_CODE" = "409" ] || [ "$HTTP_CODE" = "422" ]; then
              echo "  ⏭️  App already installed on ${ORG} (HTTP ${HTTP_CODE}) — skipping"
            else
              echo "  ⚠️  Unexpected response (HTTP ${HTTP_CODE}):"
              cat /tmp/install_response.json
              echo ""
            fi
          done
          echo "::endgroup::"

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Enterprise Terraform Apply Failed',
              body: `Terraform apply failed for commit ${context.sha}\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['terraform', 'enterprise', 'failed-apply']
            })
