name: "Enterprise: Terraform Plan"

on:
  pull_request:
    branches: [main]
    paths:
      - 'enterprise/**'
      - '.github/workflows/enterprise-plan.yml'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  terraform-plan:
    name: Enterprise Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: enterprise

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        env:
          TF_VAR_github_app_pem_file: ${{ secrets.ENT_APP_PRIVATE_KEY }}
        continue-on-error: true

      - name: Add Plan Comment to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### 🏢 Enterprise — Terraform Plan

            #### Format 🖌 \`${{ steps.fmt.outcome }}\`
            #### Init ⚙️ \`${{ steps.init.outcome }}\`
            #### Validate 🤖 \`${{ steps.validate.outcome }}\`
            #### Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
