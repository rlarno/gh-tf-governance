name: "Org: Terraform Apply"

on:
  push:
    branches: [main]
    paths:
      - 'orgs/**'
      - '.github/workflows/org-apply.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # ── Detect which orgs changed ──────────────────────────────────
  detect:
    name: Detect changed orgs
    runs-on: ubuntu-latest
    outputs:
      orgs: ${{ steps.changes.outputs.orgs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine changed org directories
        id: changes
        run: |
          ORGS=$(git diff --name-only HEAD~1 HEAD \
            | grep '^orgs/' \
            | cut -d'/' -f2 \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "orgs=${ORGS}" >> "$GITHUB_OUTPUT"
          echo "Changed orgs: ${ORGS}"

  # ── Apply each changed org ─────────────────────────────────────
  terraform-apply:
    name: "Apply: ${{ matrix.org }}"
    needs: detect
    if: needs.detect.outputs.orgs != '[]' && needs.detect.outputs.orgs != ''
    runs-on: ubuntu-latest
    environment: org-${{ matrix.org }}
    strategy:
      fail-fast: false
      matrix:
        org: ${{ fromJson(needs.detect.outputs.orgs) }}

    defaults:
      run:
        working-directory: orgs/${{ matrix.org }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        env:
          TF_VAR_github_app_pem_file: ${{ secrets.ENT_APP_PRIVATE_KEY }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false tfplan
        env:
          TF_VAR_github_app_pem_file: ${{ secrets.ENT_APP_PRIVATE_KEY }}

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Org ${{ matrix.org }} Terraform Apply Failed',
              body: `Terraform apply failed for org \`${{ matrix.org }}\` on commit ${context.sha}\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['terraform', 'org-${{ matrix.org }}', 'failed-apply']
            })
